<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yogaval 2026 | Exploring the Koshas</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="events/shared.css">
    <style>
        /* Table styles for synthesis page */
        #content table { border-collapse: collapse; width: 100%; margin: 1em 0; }
        #content th, #content td { border: 1px solid #ddd; padding: 8px 12px; text-align: left; }
        #content th { background: #f5f5f5; }
    </style>
</head>
<body>
    <header>
        <h1>Yogaval 2026</h1>
        <p id="page-subtitle">Exploring the Koshas &mdash; Satchidananda &mdash; Uruguay, February 2026</p>
    </header>

    <div id="other-talks" style="text-align:center; margin-bottom: 10px; font-size: 0.9em; color: #666;">
        <span id="other-talks-label" data-href="events/">Select <a href="events/">a talk</a>:</span>
        <select id="talk-select" onchange="handleTalkSelect(this)" style="font-size: 0.95em; padding: 4px 8px;"></select>
    </div>

    <div class="lang-toggle">
        <button id="btn-en" onclick="loadSynthesis('en')">English<span class="lang-sublabel">Original</span></button>
        <button id="btn-es" onclick="loadSynthesis('es')">Espa&ntilde;ol<span class="lang-sublabel">AI Traducido</span></button>
        <button id="btn-ne" onclick="loadSynthesis('ne')">नेपाली<span class="lang-sublabel">AI अनुवादित</span></button>
    </div>

    <div id="content">
        <p id="loading">Loading synthesis...</p>
    </div>

    <footer>
        <a href="events/">Browse Individual Talks</a>
        <div class="site-credit">Made with 🧠❤️🙏 by <a href="https://yogicapproach.com" target="_blank" rel="noopener">YogicApproach</a>.</div>
    </footer>

    <script src="events/shared.js"></script>
    <script>
        async function loadSynthesis(lang) {
            var isEs = lang === 'es';
            var isNe = lang === 'ne';
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            document.getElementById('btn-es').classList.toggle('active', isEs);
            document.getElementById('btn-ne').classList.toggle('active', isNe);
            var url = new URL(window.location);
            url.searchParams.set('lang', lang);
            history.replaceState(null, '', url);
            document.getElementById('page-subtitle').innerHTML = isNe
                ? 'कोशहरूको अन्वेषण &mdash; सत्चिदानन्द &mdash; Uruguay, फेब्रुअरी २०२६'
                : (isEs
                    ? 'Explorando los Koshas &mdash; Satchidananda &mdash; Uruguay, febrero 2026'
                    : 'Exploring the Koshas &mdash; Satchidananda &mdash; Uruguay, February 2026');
            var labelEl = document.getElementById('other-talks-label');
            if (labelEl) {
                var href = labelEl.dataset.href || 'events/';
                labelEl.innerHTML = isNe
                    ? 'चर्चा <a href="' + href + '">छान्नुहोस्</a>:'
                    : (isEs
                        ? 'Ver <a href="' + href + '">una charla</a>:'
                        : 'Select <a href="' + href + '">a talk</a>:');
            }
            loadTalkSelector(lang);
            var el = document.getElementById('content');
            el.innerHTML = '<p id="loading">Loading...</p>';
            try {
                var res = await fetch('synthesis-' + lang + '.md');
                if (!res.ok) throw new Error('File not found');
                var md = await res.text();
                el.innerHTML = marked.parse(md);
                if (window.location.hash) {
                    var target = document.querySelector(window.location.hash);
                    if (target) target.scrollIntoView({ behavior: 'smooth' });
                }
            } catch (e) {
                if (lang === 'es') {
                    el.innerHTML = '<p style="text-align:center; padding: 40px; color: #666;">'
                        + 'La s&iacute;ntesis est&aacute; disponible solo en ingl&eacute;s por el momento.<br>'
                        + '<a href="?lang=en">Read in English</a></p>';
                } else if (lang === 'ne') {
                    el.innerHTML = '<p style="text-align:center; padding: 40px; color: #666;">'
                        + 'सारांश अहिले नेपालीमा उपलब्ध छैन।<br>'
                        + '<a href="?lang=en">Read in English</a></p>';
                } else {
                    el.innerHTML = '<p style="color:#c00;">Could not load synthesis. Please try again.</p>';
                }
            }
        }
        const lang = new URLSearchParams(window.location.search).get('lang') || 'en';
        loadSynthesis(lang);
    </script>
</body>
</html>
