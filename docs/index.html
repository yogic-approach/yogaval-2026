<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Redirecting…</title>
<meta name="robots" content="noindex">
</head>
<body>
<p>This site has moved. <a id="link" href="https://yogicapproach.com/events/2026-uruguay/es/">Go to the new site</a>.</p>
<script>
(function () {
  var nl = (navigator.language || 'es').toLowerCase();
  var lang = nl.startsWith('ne') ? 'ne' : nl.startsWith('en') ? 'en' : 'es';
  var dest = 'https://yogicapproach.com/events/2026-uruguay/' + lang + '/';
  document.getElementById('link').href = dest;
  location.replace(dest);
})();
</script>
</body>
</html>
